# =============================================================================
# batitong — local development compose file.
#
# Profiles:
#   core  : django-web + celery-worker + postgres + redis (always required)
#   tools : kali-mcp + hexstrike-api  (large images, opt-in)
#   llm   : ollama + ollama-init      (model storage volume)
#   full  : everything above
#
# Usage:
#   docker compose --profile full up -d --build
# =============================================================================

x-django-env: &django_env
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
  SECRET_KEY: ${SECRET_KEY}
  FERNET_KEY: ${FERNET_KEY}
  DEBUG: ${DEBUG:-1}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,django-web}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
  POSTGRES_DB: ${POSTGRES_DB:-batitong}
  POSTGRES_USER: ${POSTGRES_USER:-batitong}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-batitong}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  REDIS_URL: redis://redis:6379/0
  KALI_MCP_URL: ${KALI_MCP_URL:-http://kali-mcp:5000/mcp}
  HEXSTRIKE_API_URL: ${HEXSTRIKE_API_URL:-http://hexstrike-api:8888}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  GITHUB_MODELS_TOKEN: ${GITHUB_MODELS_TOKEN:-}
  GITHUB_MODELS_BASE_URL: ${GITHUB_MODELS_BASE_URL:-https://models.inference.ai.azure.com}
  GITHUB_MODELS_DEFAULT_MODEL: ${GITHUB_MODELS_DEFAULT_MODEL:-gpt-4o-mini}
  LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-ollama}
  LLM_PROMPT_LOGGING: ${LLM_PROMPT_LOGGING:-full}
  LLM_MAX_TOOL_ITERATIONS: ${LLM_MAX_TOOL_ITERATIONS:-4}
  LLM_TOOL_OUTPUT_CHAR_LIMIT: ${LLM_TOOL_OUTPUT_CHAR_LIMIT:-4000}
  APPROVAL_GATE_ENABLED: ${APPROVAL_GATE_ENABLED:-1}
  APPROVAL_TIMEOUT_MINUTES: ${APPROVAL_TIMEOUT_MINUTES:-60}
  RATELIMIT_ENABLE: ${RATELIMIT_ENABLE:-0}
  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@batitong.local}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-batitong-admin}

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["core", "full"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-batitong}
      POSTGRES_USER: ${POSTGRES_USER:-batitong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-batitong}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-batitong}"]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    profiles: ["core", "full"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  django-web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    profiles: ["core", "full"]
    environment:
      <<: *django_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./gui:/app/gui
      - django_media:/app/gui/media
      - django_static:/app/gui/staticfiles
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/accounts/login/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s

  celery-worker:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    profiles: ["core", "full"]
    command: ["worker"]
    environment:
      <<: *django_env
      CELERY_WORKER_QUEUES: default,heavy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./gui:/app/gui
      - django_media:/app/gui/media

  celery-worker-llm:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    profiles: ["core", "full"]
    command: ["worker"]
    environment:
      <<: *django_env
      CELERY_WORKER_QUEUES: llm
      CELERY_WORKER_CONCURRENCY: "2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./gui:/app/gui
      - django_media:/app/gui/media

  kali-mcp:
    build:
      context: .
      dockerfile: docker/kali-mcp/Dockerfile
    profiles: ["tools", "full"]
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/mcp"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  hexstrike-api:
    build:
      context: .
      dockerfile: docker/hexstrike/Dockerfile
    profiles: ["tools", "full"]
    ports:
      - "127.0.0.1:8888:8888"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    profiles: ["llm", "full"]
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || curl -fsS http://localhost:11434/api/tags >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  ollama-init:
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile
    profiles: ["llm", "full"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST_URL: http://ollama:11434
      OLLAMA_PULL_MODELS: ${OLLAMA_PULL_MODELS:-qwen2.5-coder:7b,llama3.1:8b,phi3:mini}
    restart: "no"

volumes:
  postgres_data: {}
  redis_data: {}
  ollama_models: {}
  django_media: {}
  django_static: {}
