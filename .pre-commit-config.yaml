repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.svg$|hexstrike-ai/|Scripts/'
      - id: end-of-file-fixer
        exclude: '\.svg$|hexstrike-ai/|Scripts/'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        # Bumped from 1024 to fit the bundled MITRE ATT&CK Enterprise v15.1
        # corpus (gui/apps/mitre/data/mitre_techniques_v15.json ~1.2 MB).
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^gui/

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^gui/
